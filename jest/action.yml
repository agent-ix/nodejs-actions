name: "Run Jest"
description: "Runs Jest tests inside a Docker container"

inputs:
  docker_registry_user:
    description: "Docker registry username for pulling images"
    required: true
  docker_registry_password:
    description: "Docker registry password for pulling images"
    required: true
  artifact:
    description: "Path to image.json"
    required: false
    default: "image.json"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: agent-ix/docker-actions/pull@main
      id: image
      with:
        artifact: ${{ inputs.artifact }}
        registry_user: ${{ inputs.docker_registry_user }}
        registry_password: ${{ inputs.docker_registry_password }}

    - name: Run Jest
      id: jest
      shell: bash
      continue-on-error: true
      run: |
        set -o pipefail
        if [ -f "docker-compose.yml" ] || [ -f "compose.yaml" ]; then
          docker compose run --rm dev pnpm test 2>&1 | tee jest.txt
        else
          echo "No docker-compose.yml found, using docker run..."
          docker run --rm -v "$(pwd):/app" "${{ steps.image.outputs.url }}" pnpm test 2>&1 | tee jest.txt
        fi

    - name: Upload Jest output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jest.txt
        path: jest.txt

    - name: Add summary
      if: always()
      shell: bash
      run: |
        if [ "${{ steps.jest.outcome }}" != "success" ]; then
          echo '### ❌ Jest Report' >> $GITHUB_STEP_SUMMARY
          cat jest.txt | tee /dev/stderr >> $GITHUB_STEP_SUMMARY
        fi

    - name: Fail if Jest failed
      if: steps.jest.outcome != 'success'
      shell: bash
      run: exit 1