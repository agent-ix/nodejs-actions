name: "Run Jest"
description: "Runs Jest tests inside a Docker container"

inputs:
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true
  artifact:
    description: "Path to image.json"
    required: false
    default: "image.json"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: agent-ix/docker-actions/pull@main
      id: image
      with:
        artifact: ${{ inputs.artifact }}
        registry_user: ${{ secrets.registry_user }}
        registry_password: ${{ secrets.registry_password }}

    - name: Run Jest
      shell: bash
      run: |
        docker run --rm -v "$PWD:/app" -w /app ${{ steps.meta.outputs.url }} pnpm test

    - name: Upload summary
      shell: bash
      run: |
        echo "✅ Jest complete" >> $GITHUB_STEP_SUMMARY
        mkdir -p results
        echo '{"status":"ok"}' > results/jest.json

    - uses: actions/upload-artifact@v4
      with:
        name: jest.json
        path: results/jest.json
