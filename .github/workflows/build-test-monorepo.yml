name: CI Monorepo

# pnpm workspace TEST pipeline for monorepos with packages/* and optional apps/*.
# Runs test/lint/audit only — it does NOT publish. Publishing lives in the sibling
# release-monorepo.yml reusable, wired by callers to tag pushes. Callers wire THIS
# to pull_request / push:main. trusted_publish is retained for caller
# compatibility but is a no-op here (publishing moved to release-monorepo.yml).

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: "20"
      npm_registry:
        required: false
        type: string
        default: "https://npm.pkg.github.com"
      trusted_publish:
        # Retained for caller compatibility; no-op in the test pipeline.
        # Publishing (incl. OIDC Trusted Publishing) lives in release-monorepo.yml.
        required: false
        type: boolean
        default: false
    secrets:
      NPM_REGISTRY_TOKEN:
        # Used by setup-npmrc so installs can read private @agent-ix deps.
        required: false

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - run: make lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - name: pnpm audit (production deps, high+)
        run: pnpm audit --audit-level=high --prod
