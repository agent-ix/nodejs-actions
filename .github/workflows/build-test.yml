name: CI v2

# Bare-node_modules CI for TS/React repos.
# Replaces the Docker-based build-test.yml. Two parallel status checks
# (test, lint), plus a publish job that runs after both pass.
# Each job does its own `pnpm install --frozen-lockfile` against a shared
# pnpm store cache — warm-store install is a few seconds.

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        # Node 22 because pnpm 11 (corepack default) requires `node:sqlite`,
        # which only ships in Node ≥22.5. Bumping out of pnpm-11/Node-20
        # incompatibility.
        default: "22"
      npm_registry:
        required: false
        type: string
        default: "https://npm.pkg.github.com"
      trusted_publish:
        # Opt-in: publish to public npm via OIDC Trusted Publishing (tokenless).
        # When true, the publish job uses the GitHub OIDC id-token instead of
        # NPM_REGISTRY_TOKEN, and setup-npmrc writes a token-free .npmrc.
        # Set npm_registry to https://registry.npmjs.org alongside this.
        required: false
        type: boolean
        default: false
      docker_repository:
        required: false
        type: string
        default: ""
      docker_registry:
        required: false
        type: string
        default: "ghcr.io"
    secrets:
      NPM_REGISTRY_TOKEN:
        # Not required when trusted_publish is true (OIDC needs no token).
        required: false
      DOCKER_REGISTRY_USER:
        required: false
      DOCKER_REGISTRY_PASSWORD:
        required: false

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - run: make lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - name: pnpm audit (production deps, high+)
        run: pnpm audit --audit-level=high --prod

  publish:
    runs-on: ubuntu-latest
    needs: [test, lint, audit]
    permissions:
      contents: read
      id-token: write   # OIDC token for npm Trusted Publishing (no-op when token-based)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_registry }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}

      # Trusted Publishing (OIDC) needs npm >= 11.5.1.
      - name: Upgrade npm for Trusted Publishing
        if: ${{ inputs.trusted_publish }}
        run: npm install -g npm@latest

      - run: make install
      - run: make build

      - name: Resolve base version
        id: base
        shell: bash
        run: |
          git fetch origin --tags --force
          EXACT_TAG=$(git describe --tags --exact-match 2>/dev/null || true)
          STATUS=$(git status --porcelain)
          if [[ -n "$EXACT_TAG" && -z "$STATUS" ]]; then
            BASE="${EXACT_TAG#v}"
          else
            BASE=$(make version | tail -n 1)
            BASE="${BASE#v}"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Resolve final version (auto-bump if already published)
        id: version
        shell: bash
        env:
          # Empty under OIDC: `npm view` reads public npm unauthenticated.
          NODE_AUTH_TOKEN: ${{ inputs.trusted_publish && '' || secrets.NPM_REGISTRY_TOKEN }}
        run: |
          BASE="${{ steps.base.outputs.base }}"
          PKG_NAME=$(node -p "require('./package.json').name")
          VERSION="$BASE"
          ATTEMPT=0
          while npm view "$PKG_NAME@$VERSION" > /dev/null 2>&1; do
            ATTEMPT=$((ATTEMPT + 1))
            VERSION=$(node -e '
              const base = process.argv[1];
              const attempt = Number(process.argv[2]);
              const m = base.match(/^(\d+)\.(\d+)\.(\d+)(-.+)?$/);
              if (!m) throw new Error(`bad semver: ${base}`);
              console.log(`${m[1]}.${m[2]}.${Number(m[3])+attempt}${m[4] ?? ""}`);
            ' "$BASE" "$ATTEMPT")
          done
          echo "package=$PKG_NAME"     >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"      >> "$GITHUB_OUTPUT"
          echo "package_id=$PKG_NAME@$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve dist-tag
        id: disttag
        shell: bash
        run: |
          PR="${{ github.event.pull_request.number }}"
          if [[ -n "$PR" ]]; then echo "tag=pr-$PR" >> "$GITHUB_OUTPUT"; fi

      - name: Inject version into package.json
        shell: bash
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version=$v' package.json > tmp && mv tmp package.json

      - name: Publish to npm
        shell: bash
        env:
          # Empty under OIDC: npm performs the trusted-publish token exchange.
          NODE_AUTH_TOKEN: ${{ inputs.trusted_publish && '' || secrets.NPM_REGISTRY_TOKEN }}
          PACKAGE_ID: ${{ steps.version.outputs.package_id }}
          TAG: ${{ steps.disttag.outputs.tag }}
        run: |
          set -e
          mkdir -p logs/npm
          export npm_config_cache="$(pwd)/logs/npm"
          if npm view "$PACKAGE_ID" > /dev/null 2>&1; then
            echo "Already published: $PACKAGE_ID"
            [[ -n "$TAG" ]] && npm dist-tag add "$PACKAGE_ID" "$TAG" || true
            exit 0
          fi
          if ! npm publish --no-git-checks --tag "${TAG:-latest}"; then
            PUBLISH_EXIT=$?
            if npm view "$PACKAGE_ID" > /dev/null 2>&1; then
              echo "Race: became available during publish"
            else
              exit "$PUBLISH_EXIT"
            fi
          fi
          [[ -n "$TAG" ]] && npm dist-tag add "$PACKAGE_ID" "$TAG" || true

      - name: Upload npm debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-npm-logs
          path: logs/npm/

      - name: Write summary
        shell: bash
        run: |
          PKG="${{ steps.version.outputs.package }}"
          VER="${{ steps.version.outputs.version }}"
          ID="${{ steps.version.outputs.package_id }}"
          TAG="${{ steps.disttag.outputs.tag }}"
          {
            echo "### 📦 npm Package Published"
            echo "- Name: \`$PKG\`"
            echo "- Version: \`$VER\`"
            echo
            echo "### Package ID"
            echo '```'
            echo "$ID"
            echo '```'
            echo "### Install"
            echo '```bash'
            echo "npm install $ID"
            [[ -n "$TAG" ]] && echo "npm install $PKG@$TAG"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
