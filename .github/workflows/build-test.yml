name: CI v2

# Bare-node_modules TEST pipeline for TS/React repos. Runs test/lint/audit only —
# it does NOT publish. Publishing lives in the sibling release.yml reusable, wired
# by callers to tag pushes. Callers wire THIS to pull_request / push:main.
# The trusted_publish / docker_* inputs are retained for caller compatibility but
# are no-ops here (publishing moved to release.yml).
# Each job does its own `pnpm install --frozen-lockfile` against a shared
# pnpm store cache — warm-store install is a few seconds.

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        # Node 22 because pnpm 11 (corepack default) requires `node:sqlite`,
        # which only ships in Node ≥22.5. Bumping out of pnpm-11/Node-20
        # incompatibility.
        default: "22"
      npm_registry:
        required: false
        type: string
        default: "https://npm.pkg.github.com"
      trusted_publish:
        # Retained for caller compatibility; no-op in the test pipeline.
        # Publishing (incl. OIDC Trusted Publishing) lives in release.yml.
        required: false
        type: boolean
        default: false
      docker_repository:
        required: false
        type: string
        default: ""
      docker_registry:
        required: false
        type: string
        default: "ghcr.io"
    secrets:
      NPM_REGISTRY_TOKEN:
        # Used by setup-npmrc so installs can read private @agent-ix deps.
        required: false
      DOCKER_REGISTRY_USER:
        required: false
      DOCKER_REGISTRY_PASSWORD:
        required: false

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - run: make lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - name: pnpm audit (production deps, high+)
        run: pnpm audit --audit-level=high --prod
