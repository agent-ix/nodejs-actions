name: CI

on:
  workflow_call:
    inputs:
      repository:
        description: "Docker image name (e.g. my-org/myapp)"
        required: true
        type: string
      registry:
        required: false
        type: string
        default: ghcr.io
      npm:
        description: "NPM registry URL"
        required: true
        type: string
    secrets:
      REGISTRY_USER:
        description: "Docker registry username"
        required: true
      REGISTRY_PASSWORD:
        description: "Docker registry password"
        required: true
      NPM_TOKEN:
        description: "Auth token for npm publish"
        required: true

jobs:

  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: agent-ix/nodejs-actions/image-metadata@main
        with:
          registry: ${{ inputs.registry }}
          repository: ${{ inputs.repository }}

  build:
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v4
      - uses: agent-ix/docker-actions/build@main
        with:
          artifact: image.json
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  jest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: agent-ix/nodejs-actions/jest@main
        with:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  eslint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: agent-ix/nodejs-actions/eslint@main
        with:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  prettier:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: agent-ix/nodejs-actions/prettier@main
        with:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: agent-ix/nodejs-actions/publish@main
        with:
          artifact: image.json
          token: ${{ secrets.NPM_TOKEN }}
          registry: ${{ inputs.npm }}