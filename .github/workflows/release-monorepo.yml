name: Release Monorepo

# Reusable RELEASE pipeline for pnpm monorepos (packages/* + optional apps/*).
# Runs the full test/lint/audit gate then PUBLISHES all non-private packages at
# the same resolved version (linked versioning: one tag = all packages move
# together). Callers wire this to tag pushes. The sibling build-test-monorepo.yml
# reusable is the same gate WITHOUT publish, wired to pull_request / push:main.

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: "20"
      npm_registry:
        required: false
        type: string
        default: "https://npm.pkg.github.com"
      trusted_publish:
        # Opt-in: publish to public npm via OIDC Trusted Publishing (tokenless).
        # pnpm >= 10 performs the OIDC token exchange (workspace:* deps are still
        # rewritten on publish). Set npm_registry to https://registry.npmjs.org
        # and node_version to "22" (OIDC needs Node >= 22.14) alongside this.
        required: false
        type: boolean
        default: false
    secrets:
      NPM_REGISTRY_TOKEN:
        # Not required when trusted_publish is true (OIDC needs no token).
        required: false

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - run: make lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - run: make install
      - name: pnpm audit (production deps, high+)
        run: pnpm audit --audit-level=high --prod

  publish:
    runs-on: ubuntu-latest
    needs: [test, lint, audit]
    permissions:
      contents: read
      id-token: write   # OIDC token for npm Trusted Publishing (no-op when token-based)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_registry }}
          cache: pnpm
      - uses: agent-ix/nodejs-actions/setup-npmrc@main
        with:
          npm_registry: ${{ inputs.npm_registry }}
          npm_registry_token: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - run: make install
      - run: make build

      - name: Resolve base version
        id: base
        shell: bash
        run: |
          git fetch origin --tags --force
          # Prefer the tag that triggered this workflow (GITHUB_REF_NAME on a
          # tag push). `git describe --exact-match` returns the *oldest* tag at
          # the commit, which silently picks the wrong version when one commit
          # carries multiple tags (e.g. moving a tag forward by re-tagging).
          REF_TAG=""
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            REF_TAG="${GITHUB_REF#refs/tags/}"
          fi
          STATUS=$(git status --porcelain)
          if [[ -n "$REF_TAG" && -z "$STATUS" ]]; then
            BASE="${REF_TAG#v}"
          else
            BASE=$(make version | tail -n 1)
            BASE="${BASE#v}"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Resolve final version (auto-bump if any package already published)
        id: version
        shell: bash
        env:
          # Empty under OIDC: `npm view` reads public npm unauthenticated.
          NODE_AUTH_TOKEN: ${{ inputs.trusted_publish && '' || secrets.NPM_REGISTRY_TOKEN }}
        run: |
          BASE="${{ steps.base.outputs.base }}"
          VERSION="$BASE"
          ATTEMPT=0

          # Collect all publishable package names (non-private packages/* and apps/*)
          PKGS=()
          for dir in packages/*/  apps/*/; do
            [[ -f "$dir/package.json" ]] || continue
            IS_PRIVATE=$(node -p "require('./$dir/package.json').private ?? false")
            [[ "$IS_PRIVATE" == "true" ]] && continue
            PKG_NAME=$(node -p "require('./$dir/package.json').name")
            PKGS+=("$PKG_NAME")
          done

          # Auto-bump until no package at this version exists
          while true; do
            CONFLICT=false
            for PKG_NAME in "${PKGS[@]}"; do
              if npm view "$PKG_NAME@$VERSION" > /dev/null 2>&1; then
                CONFLICT=true
                break
              fi
            done
            [[ "$CONFLICT" == "false" ]] && break
            ATTEMPT=$((ATTEMPT + 1))
            VERSION=$(node -e '
              const base = process.argv[1];
              const attempt = Number(process.argv[2]);
              const m = base.match(/^(\d+)\.(\d+)\.(\d+)(-.+)?$/);
              if (!m) throw new Error(`bad semver: ${base}`);
              console.log(`${m[1]}.${m[2]}.${Number(m[3])+attempt}${m[4] ?? ""}`);
            ' "$BASE" "$ATTEMPT")
          done

          # Emit package list as newline-delimited JSON for downstream step
          PKGS_JSON=$(printf '%s\n' "${PKGS[@]}" | jq -R . | jq -s -c .)
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "packages=$PKGS_JSON" >> "$GITHUB_OUTPUT"

      - name: Resolve dist-tag
        id: disttag
        shell: bash
        run: |
          PR="${{ github.event.pull_request.number }}"
          if [[ -n "$PR" ]]; then echo "tag=pr-$PR" >> "$GITHUB_OUTPUT"; fi

      - name: Inject version into all package.json files
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Inject into workspace root and all packages
          for f in package.json packages/*/package.json apps/*/package.json; do
            [[ -f "$f" ]] || continue
            jq --arg v "$VERSION" '.version=$v' "$f" > tmp && mv tmp "$f"
          done

      - name: Publish all packages
        shell: bash
        env:
          # Empty under OIDC: pnpm performs the trusted-publish token exchange.
          NODE_AUTH_TOKEN: ${{ inputs.trusted_publish && '' || secrets.NPM_REGISTRY_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.disttag.outputs.tag }}
        run: |
          set -e
          mkdir -p logs/npm
          export npm_config_cache="$(pwd)/logs/npm"

          PKGS_JSON='${{ steps.version.outputs.packages }}'
          PUBLISHED=()

          for dir in packages/*/  apps/*/; do
            [[ -f "$dir/package.json" ]] || continue
            IS_PRIVATE=$(node -p "require('./$dir/package.json').private ?? false")
            [[ "$IS_PRIVATE" == "true" ]] && continue
            PKG_NAME=$(node -p "require('./$dir/package.json').name")
            PACKAGE_ID="$PKG_NAME@$VERSION"

            if npm view "$PACKAGE_ID" > /dev/null 2>&1; then
              echo "Already published: $PACKAGE_ID"
              [[ -n "$TAG" ]] && npm dist-tag add "$PACKAGE_ID" "$TAG" || true
              continue
            fi

            pushd "$dir" > /dev/null
            # Use `pnpm publish` (not `npm publish`) so `workspace:*` deps are
            # rewritten to the actual published version. With plain npm, the
            # workspace protocol leaks into the registry manifest and downstream
            # consumers resolve to whatever happened to be installed locally.
            if ! pnpm publish --no-git-checks --tag "${TAG:-latest}"; then
              PUBLISH_EXIT=$?
              if npm view "$PACKAGE_ID" > /dev/null 2>&1; then
                echo "Race: $PACKAGE_ID became available during publish"
              else
                exit "$PUBLISH_EXIT"
              fi
            fi
            [[ -n "$TAG" ]] && npm dist-tag add "$PACKAGE_ID" "$TAG" || true
            popd > /dev/null
            PUBLISHED+=("$PACKAGE_ID")
          done

          # Save published list for summary
          printf '%s\n' "${PUBLISHED[@]}" > /tmp/published.txt

      - name: Upload npm debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-npm-logs
          path: logs/npm/

      - name: Write summary
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.disttag.outputs.tag }}"
          {
            echo "### 📦 npm Packages Published"
            echo "- Version: \`$VERSION\`"
            echo
            echo "### Packages"
            echo '```'
            cat /tmp/published.txt 2>/dev/null || echo "(none)"
            echo '```'
            if [[ -n "$TAG" ]]; then
              echo "### Dist-tag"
              echo "\`$TAG\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
