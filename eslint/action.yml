name: "Run ESLint"
description: "Runs ESLint inside a Docker container"

inputs:
  docker_registry_user:
    description: "Docker registry username for pulling images"
    required: true
  docker_registry_password:
    description: "Docker registry password for pulling images"
    required: true
  artifact:
    description: "Path to image.json"
    required: false
    default: "image.json"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: agent-ix/docker-actions/pull@main
      id: image
      with:
        artifact: ${{ inputs.artifact }}
        registry_user: ${{ inputs.docker_registry_user }}
        registry_password: ${{ inputs.docker_registry_password }}

    - name: Run ESLint
      id: eslint
      shell: bash
      continue-on-error: true
      run: |
        set -o pipefail
        docker compose run --rm dev pnpm eslint 2>&1 | tee eslint.txt

    - name: Upload ESLint output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: eslint.txt
        path: eslint.txt

    - name: Add summary
      if: always()
      shell: bash
      run: |
        if [ "${{ steps.eslint.outcome }}" != "success" ]; then
          echo '### ❌ ESLint Report' >> $GITHUB_STEP_SUMMARY
          cat eslint.txt | tee /dev/stderr >> $GITHUB_STEP_SUMMARY
        fi

    - name: Fail if ESLint failed
      if: steps.eslint.outcome != 'success'
      shell: bash
      run: exit 1