name: "Release to npm"
description: "Publishes a Node.js package to the configured npm registry using a Docker dev image"

inputs:
  artifact:
    description: "Path to image.json containing the image reference"
    required: true
  token:
    description: "NPM auth token (must have write access)"
    required: true
  registry:
    description: "Registry URL for publishing (e.g., https://npm.pkg.github.com)"
    required: false
    default: "https://npm.pkg.github.com"
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: agent-ix/docker-actions/pull@main
      id: image
      with:
        artifact: ${{ inputs.artifact }}
        registry_user: ${{ inputs.registry_user }}
        registry_password: ${{ inputs.registry_password }}

    - name: Inject version into package.json
      shell: bash
      run: |
        jq --arg version "${{ steps.image.outputs.version }}" \
        '.version = $version' package.json > tmp \
        && mv tmp package.json

    - name: Publish to npm
      shell: bash
      run: |
        docker compose run --rm \
          -e NODE_AUTH_TOKEN="${{ inputs.token }}" \
          dev /bin/bash -c "echo '//npm.pkg.github.com/:_authToken=\$NODE_AUTH_TOKEN' > ~/.npmrc && npm publish \
          --tag ${{ steps.version.outputs.version }} \
          --no-git-checks"

    - name: Write summary
      shell: bash
      run: |
        PKG=$(jq -r .name package.json)
        VERSION="${{ steps.meta.outputs.VERSION }}"

        echo "### 📦 npm Package Published" >> $GITHUB_STEP_SUMMARY
        echo "- Version: \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Registry: \`${{ inputs.registry }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Package ID:" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "${PKG}@${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        if [[ "${{ inputs.registry }}" == *"github.com"* ]]; then
          INSTALL_URL="@${{ github.repository_owner }}/$PKG"
          REGISTRY_URL="https://github.com/${{ github.repository_owner }}/packages"
        else
          INSTALL_URL="$PKG@${VERSION}"
          REGISTRY_URL="https://www.npmjs.com/package/$PKG/v/${VERSION}"
        fi

        echo "- Example install:" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "npm install $INSTALL_URL" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "- [View package]($REGISTRY_URL)" >> $GITHUB_STEP_SUMMARY
