name: "Release to npm"
description: "Publishes a Node.js package to the configured npm registry using a Docker dev image"

inputs:
  artifact:
    description: "Path to image.json containing the image reference"
    required: true
  token:
    description: "NPM auth token (must have write access)"
    required: true
  registry:
    description: "Registry URL for publishing (e.g., https://npm.pkg.github.com)"
    required: false
    default: "https://npm.pkg.github.com"
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: agent-ix/docker-actions/pull@main
      id: image
      with:
        artifact: ${{ inputs.artifact }}
        registry_user: ${{ inputs.registry_user }}
        registry_password: ${{ inputs.registry_password }}

    - name: Resolve publish metadata
      id: meta
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ secrets.token }}
      run: |
        PR="${{ github.event.pull_request.number }}"
        BASE_VERSION="${{ steps.image.outputs.version }}"
        PKG_NAME=$(node -p "require('./package.json').name")

        VERSION="$BASE_VERSION"
        ATTEMPT=0
        while npm view "$PKG_NAME@$VERSION" > /dev/null 2>&1; do
          ATTEMPT=$((ATTEMPT + 1))
          VERSION="$BASE_VERSION.$ATTEMPT"
        done

        TAG="pr-$PR"
        PACKAGE_ID="$PKG_NAME@$VERSION"

        echo "📦 Final resolved version: $VERSION"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "package=$PKG_NAME" >> "$GITHUB_OUTPUT"
        echo "package_id=$PACKAGE_ID" >> "$GITHUB_OUTPUT"
        echo "pr=$PR" >> "$GITHUB_OUTPUT"

    - name: Inject version into package.json
      shell: bash
      run: |
        jq --arg version "${{ steps.meta.outputs.version }}" \
        '.version = $version' package.json > tmp \
        && mv tmp package.json

    - name: Publish to npm
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.token }}
      run: |
        mkdir -p logs/npm
        docker compose run --rm \
          -e VERSION="${{ steps.meta.outputs.version }}" \
          -e TAG="${{ steps.meta.outputs.tag }}" \
          -e PKG_NAME="${{ steps.meta.outputs.package }}" \
          -v "$(pwd)/logs/npm:/root/.npm/_logs" \
          dev bash -c '
            echo "//npm.pkg.github.com/:_authToken=$NODE_AUTH_TOKEN" > ~/.npmrc

            echo "📦 Publishing $PKG_NAME@$VERSION with tag $TAG"
            npm publish --no-git-checks
            npm dist-tag add "$PKG_NAME@$VERSION" "$TAG"
          '

    - name: Upload npm debug logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: publish-npm-logs
        path: logs/npm/

    - name: Write summary
      shell: bash
      run: |
        VERSION="${{ steps.meta.outputs.version }}"
        TAG="${{ steps.meta.outputs.tag }}"
        PKG_NAME="${{ steps.meta.outputs.package }}"
        PACKAGE_ID="${{ steps.meta.outputs.package_id }}"

        echo "### 📦 npm Package Published" >> $GITHUB_STEP_SUMMARY
        echo "- Name: \`$PKG_NAME\`" >> $GITHUB_STEP_SUMMARY
        echo "- Version: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "### Package ID:" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$PACKAGE_ID" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "### Install:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🎯 specific version:" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "npm install $PACKAGE_ID" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "🔄 floating PR tag:" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "npm install $PKG_NAME@$TAG" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
