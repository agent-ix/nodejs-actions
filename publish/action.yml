name: "Release to npm"
description: "Publishes a Node.js package to the configured npm registry using a Docker dev image"

inputs:
  artifact:
    description: "Path to image.json containing the image reference"
    required: true
  token:
    description: "NPM auth token (must have write access)"
    required: true
  registry:
    description: "Registry URL for publishing (e.g., https://npm.pkg.github.com)"
    required: false
    default: "https://npm.pkg.github.com"
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: agent-ix/docker-actions/pull@main
      id: image
      with:
        artifact: ${{ inputs.artifact }}
        registry_user: ${{ inputs.registry_user }}
        registry_password: ${{ inputs.registry_password }}

    - name: Inject version into package.json
      shell: bash
      run: |
        jq --arg version "${{ steps.image.outputs.version }}" \
        '.version = $version' package.json > tmp \
        && mv tmp package.json

    - name: Publish to npm
      shell: bash
      run: |
        docker compose run --rm \
          -e NODE_AUTH_TOKEN="${{ inputs.token }}" \
          dev bash -c '
            echo "//npm.pkg.github.com/:_authToken=$NODE_AUTH_TOKEN" > ~/.npmrc

            PR="${{ github.event.pull_request.number }}"
            VERSION="${{ steps.image.outputs.version }}"
            TAG="pr-$PR"
            PKG_NAME=$(node -p "require(\"./package.json\").name")

            echo "📦 Publishing $PKG_NAME@$VERSION with tag $TAG"
            npm publish --tag "$TAG" --no-git-checks
          '

    - name: Write summary
      shell: bash
      run: |
        PR="${{ github.event.pull_request.number }}"
        VERSION="${{ steps.image.outputs.version }}"
        TAG="pr-$PR"
        PKG_NAME=$(node -p "require('./package.json').name")

        echo "### 📦 npm Package Published" >> $GITHUB_STEP_SUMMARY
        echo "- Version: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "- Registry: [https://npm.pkg.github.com](https://npm.pkg.github.com)" >> $GITHUB_STEP_SUMMARY
        echo "- Package ID:" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$PKG_NAME@$VERSION" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- 🎯 Example install (specific version):" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "npm install $PKG_NAME@$VERSION" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "- 🔄 Example install (floating PR tag):" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "npm install $PKG_NAME@$TAG" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "- [View package](https://github.com/orgs/${{ github.repository_owner }}/packages?repo_name=${{ github.event.repository.name }})" >> $GITHUB_STEP_SUMMARY
