name: "Release to npm"
description: "Publishes a Node.js package to the configured npm registry using a Docker dev image"

inputs:
  artifact:
    description: "Path to image.json containing the image reference"
    required: true
  docker_registry_user:
    description: "Docker registry username"
    required: true
  docker_registry_password:
    description: "Docker registry password"
    required: true
  npm_registry:
    description: "NPM registry URL"
    required: false
    default: "https://npm.pkg.github.com"
  npm_registry_token:
    description: "NPM auth token"
    required: true
  github_token:
    description: "GitHub token for API calls"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: agent-ix/docker-actions/pull@main
      id: image
      with:
        artifact: ${{ inputs.artifact }}
        registry_user: ${{ inputs.docker_registry_user }}
        registry_password: ${{ inputs.docker_registry_password }}

    - uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        registry-url: ${{ inputs.npm_registry }}

    - name: Configure npm registry for CI
      shell: bash
      env:
        NPM_REGISTRY: ${{ inputs.npm_registry }}
        NPM_TOKEN: ${{ inputs.npm_registry_token }}
      run: |
        export NPM_REGISTRY_HOST=$(echo "$NPM_REGISTRY" | sed 's|https\?://||;s|/$||')
        printf 'registry=https://registry.npmjs.org/\n@agent-ix:registry=%s\n//%s/:_authToken=%s\n' "$NPM_REGISTRY" "$NPM_REGISTRY_HOST" "$NPM_TOKEN" > .npmrc

    - name: Get PR
      id: get_pr
      uses: agent-ix/git-actions/get-pr@main
      with:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Resolve latest version
      id: version
      shell: bash
      env:
        NPM_REGISTRY: ${{ inputs.npm_registry }}
        NODE_AUTH_TOKEN: ${{ inputs.npm_registry_token }}
      run: |
        BASE_VERSION="${{ steps.image.outputs.version }}"
        BASE_VERSION="${BASE_VERSION#v}"
        PKG_NAME=$(node -p "require('./package.json').name")
        echo "📦 Base version: $BASE_VERSION"

        VERSION="$BASE_VERSION"
        ATTEMPT=0
        while npm view "$PKG_NAME@$VERSION" > /dev/null 2>&1; do
          ATTEMPT=$((ATTEMPT + 1))
          VERSION=$(node -e '
            const base = process.argv[1];
            const attempt = Number(process.argv[2]);
            const match = base.match(/^(\d+)\.(\d+)\.(\d+)(-.+)?$/);
            if (!match) {
              throw new Error(`Unsupported semver base: ${base}`);
            }

            const major = Number(match[1]);
            const minor = Number(match[2]);
            const patch = Number(match[3]) + attempt;
            const suffix = match[4] ?? "";
            console.log(`${major}.${minor}.${patch}${suffix}`);
          ' "$BASE_VERSION" "$ATTEMPT")
        done
        PACKAGE_ID="$PKG_NAME@$VERSION"
        echo "📦 Final resolved version: $PACKAGE_ID"
        echo "package=$PKG_NAME" >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "package_id=$PACKAGE_ID" >> "$GITHUB_OUTPUT"

    - name: Resolve dist-tags
      id: meta
      shell: bash
      run: |
        PR="${{ steps.get_pr.outputs.pr }}"
        PKG_NAME="${{ steps.version.outputs.package }}"

        if [[ -n "$PR" ]]; then
          TAG="pr-$PR"
          echo ""
          echo "🏷 Pull Request Tag: $PKG_NAME@$TAG"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "pr=$PR" >> "$GITHUB_OUTPUT"

    - name: Inject version into package.json
      shell: bash
      run: |
        jq --arg version "${{ steps.version.outputs.version }}" \
        '.version = $version' package.json > tmp \
        && mv tmp package.json

    - name: Publish to npm
      shell: bash
      env:
        NPM_REGISTRY: ${{ inputs.npm_registry }}
        NPM_TOKEN: ${{ inputs.npm_registry_token }}
      run: |
        mkdir -p logs/npm
        export NPM_REGISTRY_HOST=$(echo "$NPM_REGISTRY" | sed 's|https\?://||;s|/$||')
        PUBLISH_CMD='set -e
        printf "registry=https://registry.npmjs.org/\n@agent-ix:registry=%s\n//%s/:_authToken=%s\n" "$NPM_REGISTRY" "$NPM_REGISTRY_HOST" "$NPM_TOKEN" > /root/.npmrc
        if npm view "$PACKAGE_ID" > /dev/null 2>&1; then
          echo "Package already published: $PACKAGE_ID"
          if [[ -n "$TAG" ]]; then
            npm dist-tag add "$PACKAGE_ID" "$TAG" || true
          fi
          exit 0
        fi
        if npm publish --no-git-checks --tag "${TAG:-latest}"; then
          :
        else
          PUBLISH_EXIT=$?
          if npm view "$PACKAGE_ID" > /dev/null 2>&1; then
            echo "Package became available during publish race: $PACKAGE_ID"
          else
            exit "$PUBLISH_EXIT"
          fi
        fi
        if [[ -n "$TAG" ]]; then
          npm dist-tag add "$PACKAGE_ID" "$TAG" || true
        fi'

        if [ -f "docker-compose.yml" ] || [ -f "compose.yaml" ]; then
          docker compose run --rm \
            -e TAG="${{ steps.meta.outputs.tag }}" \
            -e PACKAGE_ID="${{ steps.version.outputs.package_id }}" \
            -e NPM_REGISTRY \
            -e NPM_REGISTRY_HOST \
            -e NPM_TOKEN \
            -v "$(pwd)/logs/npm:/root/.npm/_logs" \
            dev bash -c "$PUBLISH_CMD"
        else
          echo "No docker-compose.yml found, using docker run with image: ${{ steps.image.outputs.url }}"
          docker run --rm \
            -e TAG="${{ steps.meta.outputs.tag }}" \
            -e PACKAGE_ID="${{ steps.version.outputs.package_id }}" \
            -e NPM_REGISTRY \
            -e NPM_REGISTRY_HOST \
            -e NPM_TOKEN \
            -v "$(pwd):/app" \
            -v "$(pwd)/logs/npm:/root/.npm/_logs" \
            "${{ steps.image.outputs.url }}" bash -c "$PUBLISH_CMD"
        fi

    - name: Upload npm debug logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: publish-npm-logs
        path: logs/npm/

    - name: Write summary
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="${{ steps.meta.outputs.tag }}"
        PKG_NAME="${{ steps.version.outputs.package }}"
        PACKAGE_ID="${{ steps.version.outputs.package_id }}"

        echo "### 📦 npm Package Published" >> $GITHUB_STEP_SUMMARY
        echo "- Name: \`$PKG_NAME\`" >> $GITHUB_STEP_SUMMARY
        echo "- Version: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "### Package ID:" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$PACKAGE_ID" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "### Install:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🎯 specific version:" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "npm install $PACKAGE_ID" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "🔄 floating PR tag:" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "npm install $PKG_NAME@$TAG" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
