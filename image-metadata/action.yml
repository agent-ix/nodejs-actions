name: "Image Metadata"
description: "Generates image.json for dev container"

inputs:
  docker_registry:
    required: false
    type: string
    default: ghcr.io
    description: "Docker registry host"
  docker_repository:
    required: true
    description: "Docker image repository (e.g. org/service)"
  artifact:
    required: false
    default: "image.json"
    description: "Output artifact filename"
  tag_prefix:
    required: false
    description: "Optional prefix to prepend to tag (e.g. dev, base)"
  github_token:
    description: "GitHub token for authentication"
    required: true

outputs:
  version:
    description: "Resolved version"
    value: ${{ steps.meta.outputs.version }}
  url:
    description: "Fully qualified image URL"
    value: ${{ steps.meta.outputs.url }}
  image:
    description: "Image path without tag"
    value: ${{ steps.meta.outputs.image }}

runs:
  using: "composite"
  steps:
    - name: Refresh git tags
      shell: bash
      run: |
        git fetch origin --tags --force

    - name: Extract version and description from package.json
      id: data
      shell: bash
      run: |
        desc=$(jq -r .description package.json)
        echo "description=$desc" >> "$GITHUB_OUTPUT"
        
        # Try to get exact tag first if clean
        EXACT_TAG=$(git describe --tags --exact-match 2>/dev/null || true)
        STATUS=$(git status --porcelain)
        
        if [[ -n "$EXACT_TAG" && -z "$STATUS" ]]; then
          echo "Using exact tag version: $EXACT_TAG"
          echo "version=$EXACT_TAG" >> "$GITHUB_OUTPUT"
          echo "is_release=true" >> "$GITHUB_OUTPUT"
        else
          echo "Using make version fallback"
          echo "version=$(make version | tail -n 1)" >> "$GITHUB_OUTPUT"
          echo "is_release=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Generate image metadata
      id: meta
      uses: agent-ix/docker-actions/create-metadata@main
      with:
        registry: ${{ inputs.docker_registry }}
        repository: ${{ inputs.docker_repository }}
        version: ${{ steps.data.outputs.version }}
        description: ${{ steps.data.outputs.description }}
        artifact: ${{ inputs.artifact }}
        tag_prefix: ${{ inputs.tag_prefix }}
        is_release: ${{ steps.data.outputs.is_release }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
