name: "Image Metadata"
description: "Generates image.json for dev container"

inputs:
  docker_registry:
    required: false
    type: string
    default: ghcr.io
    description: "Docker registry host"
  docker_repository:
    required: true
    description: "Docker image repository (e.g. org/service)"
  artifact:
    required: false
    default: "image.json"
    description: "Output artifact filename"
  tag_prefix:
    required: false
    description: "Optional prefix to prepend to tag (e.g. dev, base)"
  github_token:
    description: "GitHub token for authentication"
    required: true

outputs:
  version:
    description: "Resolved version"
    value: ${{ steps.meta.outputs.version }}
  url:
    description: "Fully qualified image URL"
    value: ${{ steps.meta.outputs.url }}
  image:
    description: "Image path without tag"
    value: ${{ steps.meta.outputs.image }}

runs:
  using: "composite"
  steps:
    - name: Extract version and description from package.json
      id: data
      shell: bash
      run: |
        desc=$(jq -r .description package.json)
        echo "description=$desc" >> "$GITHUB_OUTPUT"
        echo "version=$(make version)" >> "$GITHUB_OUTPUT"

    - name: Generate image metadata
      id: meta
      uses: agent-ix/docker-actions/create-metadata@main
      with:
        registry: ${{ inputs.docker_registry }}
        repository: ${{ inputs.docker_repository }}
        version: ${{ steps.data.outputs.version }}
        description: ${{ steps.data.outputs.description }}
        artifact: ${{ inputs.artifact }}
        tag_prefix: ${{ inputs.tag_prefix }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
