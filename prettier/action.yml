name: "Run Prettier"
description: "Runs Prettier inside a Docker container"

inputs:
  docker_registry_user:
    description: "Docker registry username for pulling images"
    required: true
  docker_registry_password:
    description: "Docker registry password for pulling images"
    required: true
  artifact:
    description: "Path to image.json"
    required: false
    default: "image.json"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: agent-ix/docker-actions/pull@main
      id: image
      with:
        artifact: ${{ inputs.artifact }}
        registry_user: ${{ inputs.docker_registry_user }}
        registry_password: ${{ inputs.docker_registry_password }}

    - name: Run Prettier
      id: prettier
      shell: bash
      continue-on-error: true
      run: |
        set -o pipefail
        docker run --rm -v "$(pwd):/app" "${{ steps.image.outputs.url }}" pnpm prettier --check . 2>&1 | tee prettier.txt

    - name: Upload Prettier output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: prettier.txt
        path: prettier.txt

    - name: Add summary
      if: always()
      shell: bash
      run: |
        if [ "${{ steps.prettier.outcome }}" != "success" ]; then
          echo '### ❌ Prettier Report' >> $GITHUB_STEP_SUMMARY
          cat prettier.txt | tee /dev/stderr >> $GITHUB_STEP_SUMMARY
        fi

    - name: Fail if Prettier failed
      if: steps.prettier.outcome != 'success'
      shell: bash
      run: exit 1
